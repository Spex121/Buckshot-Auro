name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install pyinstaller requests rich pywinctl
      - run: pyinstaller --onefile --hidden-import=requests --hidden-import=rich --hidden-import=rich.progress --hidden-import=rich.console --hidden-import=pywinctl --console auro.py
      - run: pyinstaller --onefile --hidden-import=requests --hidden-import=rich --hidden-import=rich.console --console helper.py
      - uses: actions/upload-artifact@v4
        with:
          name: auro-linux
          path: dist/auro
      - uses: actions/upload-artifact@v4
        with:
          name: helper-linux
          path: dist/helper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install pyinstaller requests rich pywinctl
      - run: pyinstaller --onefile --hidden-import=requests --hidden-import=rich --hidden-import=rich.progress --hidden-import=rich.console --hidden-import=pywinctl --console auro.py
      - run: pyinstaller --onefile --hidden-import=requests --hidden-import=rich.console --console helper.py
      - uses: actions/upload-artifact@v4
        with:
          name: auro-windows
          path: dist/auro.exe
      - uses: actions/upload-artifact@v4
        with:
          name: helper-windows
          path: dist/helper.exe
